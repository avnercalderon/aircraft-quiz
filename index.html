<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aircraft Recognition Quiz</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
.quiz-container { background: #fff; border-radius: 16px; padding: 2rem; max-width: 680px; width: 100%; box-shadow: 0 2px 16px rgba(0,0,0,0.10); }
.metrics { display: flex; gap: 10px; margin-bottom: 1.25rem; }
.metric { flex: 1; background: #f8f9fb; border-radius: 10px; padding: 0.6rem 0.75rem; text-align: center; }
.metric-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
.metric-value { font-size: 22px; font-weight: 600; color: #1a2236; }
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
.progress-track { flex: 1; height: 5px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: #2563eb; border-radius: 3px; transition: width 0.3s; }
.progress-text { font-size: 12px; color: #9ca3af; white-space: nowrap; }
.image-stage { background: #111827; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; overflow: hidden; height: 220px; }
.image-stage img { max-width: 100%; max-height: 210px; object-fit: contain; filter: invert(1); }
.image-stage img.dark-sil { filter: none; }
.question-text { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 1rem; }
.choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.choice-btn { background: #fff; border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 0.65rem 1rem; font-size: 14px; font-weight: 500; color: #1a2236; cursor: pointer; transition: all 0.15s; text-align: center; }
.choice-btn:hover:not(:disabled) { background: #f0f4ff; border-color: #2563eb; }
.choice-btn.correct { background: #ecfdf5; border-color: #16a34a; color: #15803d; }
.choice-btn.wrong { background: #fef2f2; border-color: #dc2626; color: #b91c1c; }
.choice-btn:disabled { cursor: default; }
.feedback { min-height: 24px; font-size: 14px; text-align: center; margin-bottom: 3px; font-weight: 500; }
.full-name { min-height: 20px; font-size: 13px; text-align: center; color: #6b7280; margin-bottom: 6px; }
.badge-row { text-align: center; margin-bottom: 0.75rem; }
.cat-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
.next-btn { display: block; width: 100%; padding: 0.7rem; border: 1.5px solid #d1d5db; border-radius: 10px; background: #fff; font-size: 14px; font-weight: 500; color: #1a2236; cursor: pointer; }
.next-btn:hover { background: #f8f9fb; }
.end-card { text-align: center; padding: 1.5rem 0; }
.end-score { font-size: 52px; font-weight: 700; color: #1a2236; }
.end-label { font-size: 15px; color: #6b7280; margin: 0.5rem 0 1.25rem; }
.end-breakdown { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 1.5rem; }
.end-item { font-size: 12px; padding: 4px 10px; border-radius: 8px; border: 1px solid #e5e7eb; }
.end-item.ok { background: #ecfdf5; border-color: #bbf7d0; color: #15803d; }
.end-item.fail { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
.restart-btn { padding: 0.65rem 2.5rem; border: 1.5px solid #d1d5db; border-radius: 10px; background: #fff; font-size: 14px; font-weight: 500; color: #1a2236; cursor: pointer; }
.restart-btn:hover { background: #f0f4ff; border-color: #2563eb; }
</style>
</head>

<div class="quiz-container">

  </div>
  <div id="quiz-area"></div>
</div>

", "FA7X", "C550"], "GL5T": ["CL60", "GLEX", "GLF5", "GLF6", "FA7X"], "GLF5": ["CL60", "GLEX", "GL5T", "GLF6", "FA7X", "C550"], "GLF6": ["CL60", "GLEX", "GL5T", "GLF5", "FA7X"], "FA7X": ["CL60", "GLEX", "GL5T", "GLF5", "GLF6", "C550"], "C550": ["CL60", "FA7X", "GLF5", "ASTR", "BE20"], "ASTR": ["C550", "CL60", "FA7X", "GL5T"], "F16": ["F15", "F22", "F35", "TOR", "SU27", "A10", "F4", "EUFI"], "F15": ["F16", "F22", "F35", "TOR", "SU27", "F4", "EUFI"], "F22": ["F16", "F15", "F35", "SU27", "B2", "TOR"], "F35": ["F16", "F15", "F22", "F4", "EUFI", "TOR"], "F4": ["F16", "F15", "F35", "TOR", "SU27", "EUFI"], "SU27": ["F15", "F16", "F22", "F4", "TOR", "EUFI"], "TOR": ["F16", "F15", "F4", "SU27", "EUFI", "B1"], "EUFI": ["F16", "F15", "F35", "F22", "TOR", "SU27"], "A10": ["F16", "F15", "TOR", "F4", "C130"], "B52": ["B1", "B2", "TOR", "KC135"], "B1": ["B52", "B2", "TOR", "SU27"], "B2": ["B52", "B1", "F22", "CONC"], "UH1": ["UH60", "AH64"], "UH60": ["UH1", "AH64"], "AH64": ["UH1", "UH60"], "C172": ["DA40", "G120", "BE20", "PAY3"], "DA40": ["C172", "G120", "BE20"], "G120": ["C172", "DA40", "CM170"], "CM170": ["G120", "C172", "F4", "A10"], "CONC": ["B703", "B52", "B1", "B2"]};
const TOTAL = 10;
let pool, current, choices, answered, score, correct, streak, qNum, results;

function shuffle(a){const arr=[...a];for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

function getWrongChoices(current) {
  const similarNames = SIMILAR[current.name] || [];
  const similarAircraft = shuffle(
    AIRCRAFT.filter(a => a.name !== current.name && similarNames.includes(a.name))
  );
  const fallback = shuffle(
    AIRCRAFT.filter(a => a.name !== current.name && !similarNames.includes(a.name))
  );
  const pool = [...similarAircraft, ...fallback];
  return pool.slice(0, 3);
}

function init(){pool=shuffle([...AIRCRAFT]);score=0;correct=0;streak=0;qNum=0;results=[];updateMetrics();next();}

function next(){
  if(qNum>=TOTAL){showEnd();return;}
  answered=false;
  current=pool[qNum%pool.length];
  const wrong = getWrongChoices(current);
  choices=shuffle([current,...wrong]);
  render();
}

function updateMetrics(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('correct-val').textContent=correct;
  document.getElementById('streak-val').textContent=streak;
  const pct=Math.round((qNum/TOTAL)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=qNum+' / '+TOTAL;
}

function render(){
  const dark=DARK_SILHOUETTES.has(current.name);
  document.getElementById('quiz-area').innerHTML=`
    <div class="image-stage">
      <img src="${current.img}" alt="Aircraft drawing" class="${dark?'dark-sil':''}" />
    </div>
    <p class="question-text">Which aircraft is this?</p>
    <div class="choices">
      ${choices.map(c=>`<button class="choice-btn" data-name="${c.name}" onclick="pick('${c.name}',this)">${c.name}</button>`).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="full-name" id="full-name"></div>
    <div class="badge-row"><span class="cat-badge" id="cat-badge" style="visibility:hidden">—</span></div>
    <button class="next-btn" id="next-btn" style="display:none" onclick="advance()">${qNum+1>=TOTAL?'See results →':'Next aircraft →'}</button>
  `;
  updateMetrics();
}

function pick(name,btn){
  if(answered)return;
  answered=true;
  const ok=name===current.name;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.name===current.name)b.classList.add('correct');
    if(b===btn&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  if(ok){correct++;streak++;score+=10+(streak>1?(streak-1)*2:0);fb.style.color='#15803d';fb.textContent=streak>2?`Correct! ${streak}x streak bonus!`:'Correct!';}
  else{streak=0;fb.style.color='#b91c1c';fb.textContent='Incorrect';}
  document.getElementById('full-name').textContent=current.full;
  document.getElementById('cat-badge').textContent=current.cat;
  document.getElementById('cat-badge').style.visibility='visible';
  document.getElementById('next-btn').style.display='block';
  results.push({name:current.name,ok});
  qNum++;updateMetrics();
}

function advance(){next();}

function showEnd(){
  const pct=Math.round((correct/TOTAL)*100);
  const msg=pct>=90?'Excellent — radar-sharp eyes!':pct>=70?'Good job — keep it up!':pct>=50?'Decent — more practice needed.':'Keep studying those silhouettes!';
  const breakdown=results.map(r=>`<span class="end-item ${r.ok?'ok':'fail'}">${r.name}</span>`).join('');
  document.getElementById('quiz-area').innerHTML=`
    <div class="end-card">
      <div class="end-score">${correct}/${TOTAL}</div>
      <div class="end-label">${msg}<br><span style="font-size:13px">Final score: ${score} pts</span></div>
      <div class="end-breakdown">${breakdown}</div>
      <button class="restart-btn" onclick="init()">Try again</button>
    </div>
  `;
  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-text').textContent=TOTAL+' / '+TOTAL;
}
init();
</script>
</body>
</html>
